<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KertasKerja - Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4 shadow-xl shadow-indigo-100">K</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Selamat Datang Kembali</h1>
            <p class="text-slate-500 mt-2 font-medium">Bikin CV lo lebih gacor hari ini.</p>
        </div>

        <div class="bg-white p-10 rounded-[40px] shadow-2xl shadow-slate-200/50 border border-white">
            <div class="space-y-4">
                <button class="w-full bg-white border-2 border-slate-100 text-slate-900 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 hover:border-slate-200 transition-all">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    Masuk Pakai Google
                </button>
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-slate-400 font-bold tracking-widest">Atau Pakai Email</span></div>
                </div>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">Email</label>
                        <input type="email" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none transition-all" placeholder="name@email.com">
                    </div>
                    <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-2">
                        Kirim Magic Link
                        <i data-lucide="wand-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            
            <p class="text-center text-slate-400 text-xs mt-8 leading-relaxed font-medium">
                Gak perlu ribet nginget password. <br> Kita bakal kirim link login langsung ke email lo.
            </p>
        </div>

        <p class="text-center mt-8 text-slate-500 text-sm font-medium">
            Belum punya akun? <a href="#" class="text-indigo-600 font-bold hover:underline">Daftar Sekarang</a>
        </p>

        <div class="mt-12 flex items-center justify-center gap-6">
            <a href="landing.html" class="text-xs font-bold text-slate-400 hover:text-slate-600 flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-3 h-3"></i>
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
